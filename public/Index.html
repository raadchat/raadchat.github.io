<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات قلوب | إدارة رضوان</title>
    
    <script src="b.js"></script>
    
    <style>
        /* الجماليات والتنسيقات المستوحاة من الصفحة السابقة */
        body {
            background-color: #e9ecef;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* الهيكل الرئيسي (الواجهة) */
        #d0 { /* منطقة الهيدر واللوجو */
            background: linear-gradient(90deg, #512da8, #673ab7);
            color: white;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        #d2 { /* قائمة الغرف والمستخدمين - الجهة الجانبية */
            background-color: #fff;
            border-left: 1px solid #ddd;
            height: calc(100vh - 110px);
            overflow-y: auto;
            width: 250px;
            float: right;
        }

        #d1 { /* منطقة الرسائل (الشات) */
            background-color: #fdfdfd;
            height: calc(100vh - 110px);
            overflow-y: auto;
            padding: 10px;
            margin-right: 250px;
            display: flex;
            flex-direction: column;
        }

        /* تنسيق الرسائل */
        .msg {
            margin-bottom: 8px;
            padding: 5px 10px;
            border-radius: 5px;
            background: #eee;
            border-right: 4px solid #673ab7;
        }

        /* منطقة الإدخال والتحكم */
        #dpnl { 
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            border-top: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* أزرار الإدارة المخفية (تظهر عند الحاجة) */
        #userpower, #uhSearch {
            border: 1px solid #673ab7;
            border-radius: 4px;
            padding: 5px;
        }

        /* تصميم الغرف (الجماليات) */
        .roomh {
            cursor: pointer;
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: 0.3s;
        }
        .roomh:hover { background-color: #f0eaff; }

        /* استجابة الجوال */
        @media (max-width: 768px) {
            #d2 { width: 100%; height: 30%; float: none; border: none; border-bottom: 1px solid #ddd; }
            #d1 { margin-right: 0; height: calc(70vh - 110px); }
        }
    </style>
</head>
<body>

    <div id="d0">
        <span class="fa fa-comments"></span> شات قلوب المميز - أهلاً بك
    </div>

    <div style="display: block; clear: both;">
        <div id="d2">
            <div style="padding:10px; font-weight:bold; border-bottom:1px solid #eee;">المتواجدون الآن</div>
            </div>

        <div id="d1">
            <div class="msg">جاري الاتصال بالسيرفر...</div>
        </div>
    </div>

    <div id="dpnl">
        <button class="btn btn-primary" id="mic"><i class="fa fa-microphone"></i></button>
        <input type="text" id="send_msg" class="form-control" placeholder="اكتب رسالتك هنا...">
        <button class="btn btn-success" onclick="send()">إرسال</button>
        
        <input type="text" id="uhSearch" placeholder="بحث رتبة" style="display:none; width:80px;">
        <select id="userpower" style="display:none;"></select>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="sm.js"></script> <script src="x3.js"></script> <script>
        $(document).ready(function() {
            // تعريف السوكيت ليكون متاحاً لملف x3.js
            window.socket = io();

            // عند الاتصال بنجاح
            window.socket.on('connect', function() {
                console.log("Connected to Server");
                // إضافة لمسة جمالية عند الدخول
                $('#d1').append('<div style="color:green; text-align:center;">✓ متصل الآن</div>');
            });
        });
    </script>
</body>
</html>

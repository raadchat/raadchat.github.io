  ============================================================

  ============================================================

  الهيكل:
  ─────────────────────────────────────────────
  1. .dad  ← قسم قبل تسجيل الدخول (مرئي بداية)
     - #tlogins  : نموذج الدخول (ضيف / عضو / تسجيل)

  2. #room ← قسم بعد تسجيل الدخول (مخفي بداية)

     - #d2       : منطقة الرسائل العامة

     - #d0       : شريط التنقل (المتواجدون/خاص/غرف/حائط/ضبط)
     - #dpnl     : اللوحة الجانبية (tab-content)

         ├─ #rooms   : قائمة الغرف

  ─────────────────────────────────────────────
  منطق الإظهار/الإخفاء (في x3_rebuilt.js):
  ─────────────────────────────────────────────
  • عند تحميل الصفحة:
      - .dad  = مرئي

  • بعد نجاح تسجيل الدخول (case 'login', msg===1):
      - $('.dad').remove()         ← يُزال قسم الدخول نهائياً
      - $('#d2,.footer,#d0').show()
      - $('#d2bc,#d2').css({display:'block',width:'100%'})
      - initChat() يُستدعى

  • عند تسجيل الخروج / logout():
      - emit('logout',{}) ← السيرفر يقطع
      - reconnect(500) ← يعيد تحميل الصفحة
  ─────────────────────────────────────────────
-->

          <option value="24">جودة المايك: الاساسيه</option>
          <option value="8">جودة المايك: ضعيفه</option>
          <option value="16">جودة المايك: متوسطه</option>
          <option value="64">جودة المايك: عاليه</option>
        </select>

        <!-- أزرار الإعدادات -->
        <label onclick="sendpic();" style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label changepic tc border btn label-info fl">
          <img style="width:32px;height:32px;margin:-8px;" class="fitimg fl borderg spic corner hand">تغير الصوره
        </label>

        <label onclick="send('setpic',{pic:'pic.png'});" style="color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border btn label-danger fl">
          <span class="fl fa fa-user-times"></span>حذف الصوره
        </label>

        <label onclick="if(nopm){nopm=false;$(this).find('span').removeClass('fa-check');}else{nopm=true;$(this).find('span').addClass('fa-check');};send('busy',{busy:nopm});"
          style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border btn fl">
          <span class="fa fl"></span>تعطيل المحادثات الخاصه
        </label>

        <label onclick="if(nonot){nonot=false;$(this).find('span').removeClass('fa-check');}else{nonot=true;$(this).find('span').addClass('fa-check');};"
          style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border btn bb4 fl">
          <span class="fa fl"></span>تعطيل التنبيهات
        </label>

        <label onclick="pmsg();" style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border pmsg btn label-info fl">
          <span class="fl fa fa-send"></span>إرسال إعلان
        </label>

        <label onclick="if(myroom!=null){redit(myroom);}" style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border redit btn label-info fl">
          <span class="fl fa fa-home"></span>إداره الغرفه
        </label>

        <a rel="opener" target="_blank" style="background-color:ghostwhite;color:black;margin:2px 4px;padding:8px;width:98%;"
          class="label tc border cp btn label-danger fl">
          <span class="fl fa fa-star"></span>لوحه التحكم
        </a>

        <!-- تسجيل الخروج -->
        <label onclick="logout();" style="margin:2px 4px;padding:8px;width:98%;"
          class="label border btn label-danger tc fl">
          <span class="fl fa fa-sign-out"></span>تسجيل خروج
        </label>

      </div>
    </div><!-- /#settings -->

    <!-- تبويب: لوحة التحكم (cp) -->
    <div id="cp" class="tab-pane light break" style="height:100%;width:100%;overflow-y:auto;">
      <ul class="nav nav-tabs" style="margin:0;">
        <li><a data-toggle="tab" href="#bans">الحظر</a></li>
        <li><a data-toggle="tab" href="#actions">الأوامر</a></li>
        <li><a data-toggle="tab" href="#cp_rooms">الغرف</a></li>
        <li><a data-toggle="tab" href="#powers">الرتب</a></li>
        <li><a data-toggle="tab" href="#subs">المشتركون</a></li>
      </ul>
      <div class="tab-content">
        <div id="bans" class="tab-pane active"></div>
        <div id="actions" class="tab-pane"></div>
        <div id="cp_rooms" class="tab-pane"></div>
        <div id="powers" class="tab-pane"></div>
        <div id="subs" class="tab-pane"></div>
      </div>
    </div>

  </div><!-- /#dpnl -->


  <!-- ══════════════════════════════════════════════════════════
       المودالات (تعمل قبل وبعد تسجيل الدخول)
  ══════════════════════════════════════════════════════════ -->

  <!-- مودال: عرض ملف المستخدم (#upro)
       يُفعّل عبر: upro(uid)
       البيانات:  .u-name / .u-pic / .u-topic / .u-likes
       data-uid  : uid المستخدم الحالي
  -->
  <div class="modal" id="upro" role="dialog" style="z-index:2100;display:none;">
    <div class="modal-dialog">
      <div class="modal-content" style="width:340px;margin:-1px;">
        <div style="color:white;margin-top:-1px;" onclick="$(this).parent().parent().parent().modal('hide');"
          class="modal-header label-primary">
          <span class="pull-right clickable badge"><i class="fa fa-times"></i></span>
          <label style="margin:1px;max-width:90%;" class="mini dots nosel modal-title u-name">ملف المستخدم</label>
        </div>
        <div class="modal-body" style="padding:4px;">
          <div class="fl pro break" style="width:100%;border:1px solid lightgrey;">
            <center>
              <div class="fitimg u-pic borderg" style="width:100px;height:100px;background-color:#f3f3f3;"></div>
              <div class="u-topic" style="font-weight:bold;margin:4px;"></div>
              <div class="u-msg mini" style="color:#888;margin:2px;"></div>
              <div style="margin:4px;">
                <span class="fa fa-heart" style="color:indianred;"></span>
                <span class="u-likes">0</span>
              </div>
            </center>
            <!-- أزرار الملف -->
            <div class="d-flex" style="padding:4px;gap:4px;flex-wrap:wrap;">
              <button onclick="sendPm($('#upro').attr('data-uid'));" class="btn btn-primary fa fa-comment flex-grow-1">خاص</button>
              <button onclick="blockUser($('#upro').attr('data-uid'));$('#upro').modal('hide');" class="btn btn-danger fa fa-ban flex-grow-1">حظر</button>
              <button onclick="send('kick',{uid:$('#upro').attr('data-uid')});" class="btn btn-warning fa fa-sign-out pkick flex-grow-1" style="display:none;">طرد</button>
              <button onclick="send('ban',{uid:$('#upro').attr('data-uid')});" class="btn btn-danger fa fa-times pban flex-grow-1" style="display:none;">حظر كلي</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /#upro -->

  <!-- مودال: مكالمة واردة (#call)
       يظهر عند استقبال cmd: call من السيرفر
       .caller-name : اسم المتصل
  -->
  <div id="call" class="c-flex border bg call"
    style="display:none;position:fixed;width:260px;z-index:1000;top:55px;left:5px;padding:2px;flex:0 1 auto;">
    <div style="padding:4px;text-align:center;">
      <span class="caller-name" style="font-weight:bold;"></span>
      <div style="margin-top:4px;">
        <button onclick="acceptCall();" class="btn btn-success fa fa-phone" style="margin:2px;width:40%;"></button>
        <button onclick="rejectCall();" class="btn btn-danger fa fa-times" style="margin:2px;width:40%;"></button>
      </div>
    </div>
  </div><!-- /#call -->

  <!-- قالب الإشعار (#not) - مخفي - يُستنسخ في showNotification() -->
  <x id="not" class="hid">
    <div class="modal fade in" style="pointer-events:none;z-index:9999;position:fixed;top:10px;right:10px;width:220px;">
      <div class="modal-content" style="padding:6px;border-radius:6px;">
        <div class="d-flex">
          <div class="fitimg not-pic borderg" style="width:40px;height:40px;background-color:#f3f3f3;"></div>
          <div style="padding:0 6px;">
            <div class="not-name" style="font-weight:bold;font-size:90%;"></div>
            <div class="not-msg mini" style="color:#555;"></div>
          </div>
        </div>
      </div>
    </div>
  </x>

  <!-- مودال: الإشعارات (#mnot) -->
  <div class="modal" id="mnot" role="dialog" style="display:none;">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header label-primary" style="color:white;">
          <span class="pull-right badge" onclick="$('#mnot').modal('hide');" style="cursor:pointer;"><i class="fa fa-times"></i></span>
          <label class="modal-title mini nosel">الإشعارات</label>
        </div>
        <div class="modal-body" id="mnotbody" style="padding:2px;max-height:300px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <!-- مودال: إنشاء غرفة (#mkr) -->
  <div class="modal" id="mkr" role="dialog" style="display:none;">
    <div class="modal-dialog">
      <div class="modal-content" style="width:340px;margin:-1px;">
        <div style="color:white;" onclick="$('#mkr').modal('hide');" class="modal-header label-primary">
          <span class="pull-right clickable badge"><i class="fa fa-times"></i></span>
          <label class="mini dots nosel modal-title">إنشاء غرفه جديدة</label>
        </div>
        <div class="modal-body" style="padding:4px;">
          <input id="rname" class="border corner form-control" style="margin-bottom:4px;" placeholder="اسم الغرفة">
          <input id="rpass" class="border corner form-control" type="password" style="margin-bottom:4px;" placeholder="كلمة المرور (اختياري)">
          <button onclick="send('mkr',{name:$('#rname').val(),pass:$('#rpass').val()});$('#mkr').modal('hide');"
            class="btn btn-success" style="width:100%;">إنشاء</button>
        </div>
      </div>
    </div>
  </div><!-- /#mkr -->
